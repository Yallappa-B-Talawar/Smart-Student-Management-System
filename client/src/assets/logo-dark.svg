<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="100%" height="100%">
  <defs>
    <style>
      .shadow { fill: rgba(255, 62, 108, 0.5); }
      .circle { fill: #27187E; stroke: #FF3E6C; stroke-width: 2.5; }
      .rect-dark { fill: #1a1930; stroke: #FF3E6C; stroke-width: 2.5; }
      .rect-pink { fill: #FF3E6C; stroke: #FF3E6C; stroke-width: 2.5; }
      .text-dark { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; font-size: 24px; fill: #1a1930; }
      .text-light { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; font-size: 24px; fill: #F7F7FF; }
      .text-icon { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; font-size: 20px; fill: #F7F7FF; }
    </style>
  </defs>

  <rect x="94" y="16" width="96" height="38" class="shadow" />
  <rect x="90" y="12" width="96" height="38" class="rect-dark" />
  <text x="138" y="39" class="text-light" text-anchor="middle">MS</text>
  
  <rect x="34" y="12" width="76" height="38" class="shadow" />
  <rect x="30" y="8" width="76" height="38" class="rect-pink" />
  <text x="68" y="35" class="text-dark" text-anchor="middle">SS</text>

  <circle cx="20" cy="30" r="16" class="shadow" transform="translate(3, 3)" />
  <circle cx="20" cy="30" r="16" class="circle" />
  <text x="20" y="37" class="text-icon" text-anchor="middle">✦</text>
</svg>
