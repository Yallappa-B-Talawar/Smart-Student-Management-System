<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="100%" height="100%">
  <defs>
    <style>
      .shadow { fill: #000000; }
      .circle { fill: #FF3E6C; stroke: #000000; stroke-width: 2.5; }
      .rect-indigo { fill: #27187E; stroke: #000000; stroke-width: 2.5; }
      .rect-lime { fill: #89E900; stroke: #000000; stroke-width: 2.5; }
      .text-lime { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; font-size: 24px; fill: #1a1a2e; }
      .text-indigo { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; font-size: 24px; fill: #FFFFFF; }
      .text-icon { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; font-size: 20px; fill: #FFFFFF; }
    </style>
  </defs>

  <!-- Indigo Rect Shadow & Box -->
  <rect x="94" y="16" width="96" height="38" class="shadow" />
  <rect x="90" y="12" width="96" height="38" class="rect-indigo" />
  <text x="138" y="39" class="text-indigo" text-anchor="middle">MS</text>
  
  <!-- Lime Rect Shadow & Box -->
  <rect x="34" y="12" width="76" height="38" class="shadow" />
  <rect x="30" y="8" width="76" height="38" class="rect-lime" />
  <text x="68" y="35" class="text-lime" text-anchor="middle">SS</text>

  <!-- Pink Circle Shadow & Box -->
  <circle cx="20" cy="30" r="16" class="shadow" transform="translate(3, 3)" />
  <circle cx="20" cy="30" r="16" class="circle" />
  <text x="20" y="37" class="text-icon" text-anchor="middle">✦</text>
</svg>
